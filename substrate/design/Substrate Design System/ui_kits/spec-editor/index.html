<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Substrate · Spec Editor</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html,body,#root{height:100%;margin:0}
  body{background:var(--bg-radial);font-family:var(--font-body);color:var(--fg-1)}

  .app{display:flex;flex-direction:column;height:100vh;min-height:700px}

  /* ── Topbar ─────────────────────────────────────────────────── */
  .topbar{display:grid;grid-template-columns:260px 1fr auto;align-items:center;gap:24px;padding:10px 20px;border-bottom:1px solid var(--pine-200);background:rgba(253,254,253,.92);backdrop-filter:blur(6px);z-index:5}
  .brand{display:flex;align-items:center;gap:10px}
  .brand img{width:26px;height:26px}
  .brand-name{font-family:var(--font-display);font-weight:500;font-size:18px;color:var(--pine-900);letter-spacing:-0.01em}
  .brand-sub{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--fg-3);padding-top:3px}
  .breadcrumbs{font-size:13px;color:var(--fg-3)}
  .breadcrumbs b{color:var(--fg-1);font-weight:600}
  .breadcrumbs .sep{margin:0 8px;color:var(--pine-300)}
  .breadcrumbs a{color:var(--fg-3);text-decoration:none}
  .breadcrumbs a:hover{color:var(--brand-blue)}
  .top-actions{display:flex;gap:10px;align-items:center}

  /* ── Workarea ───────────────────────────────────────────────── */
  .work{flex:1;display:grid;grid-template-columns:260px 1fr 340px;min-height:0}
  .left-rail,.right-rail{background:rgba(247,249,247,.7);border-inline:1px solid transparent}
  .left-rail{border-right:1px solid var(--pine-200);overflow-y:auto;padding:18px 16px}
  .right-rail{border-left:1px solid var(--pine-200);overflow-y:auto;padding:18px 16px}
  .reader{overflow-y:auto;padding:0 0 48px}

  /* ── ModuleTree ─────────────────────────────────────────────── */
  .tree-eyebrow{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--fg-3);margin:6px 0}
  .tree-folder-name{font-family:var(--font-mono);font-size:12px;color:var(--fg-3);display:block;margin-bottom:4px}
  .tree-mod{padding:5px 8px;border-radius:6px;cursor:pointer}
  .tree-mod:hover{background:var(--pine-100)}
  .tree-mod.active{background:color-mix(in oklab, var(--brand-blue) 12%, transparent)}
  .tree-mod-name{font-family:var(--font-mono);font-size:12.5px;color:var(--pine-900)}
  .tree-defs{list-style:none;padding:4px 0 2px 12px;margin:0}
  .tree-defs li{font-family:var(--font-mono);font-size:11.5px;color:var(--fg-2);padding:2px 0;position:relative}
  .tree-defs li::before{content:"";position:absolute;left:-8px;top:9px;width:4px;height:4px;border-radius:999px;background:var(--brand-orange)}
  .tree-inputs{display:flex;flex-direction:column;gap:4px;margin-bottom:14px}
  .tree-inputs > div{display:flex;justify-content:space-between;align-items:baseline;font-family:var(--font-mono);font-size:11.5px;padding:3px 8px;border-radius:5px;background:var(--bg-elev);border:1px solid var(--pine-200)}
  .tree-inputs span{color:var(--fg-3);font-size:10px}

  /* ── Reader · spec document ─────────────────────────────────── */
  .reader-mode-banner{padding:8px 32px;font-size:12.5px;color:var(--fg-2);border-bottom:1px solid var(--pine-200);display:flex;align-items:center;gap:8px}
  .reader-mode-banner.debug{background:color-mix(in oklab, var(--brand-blue) 6%, transparent)}
  .reader-mode-banner.impact{background:color-mix(in oklab, var(--brand-orange) 8%, transparent)}
  .reader-mode-banner b{color:var(--pine-900);font-family:var(--font-mono);font-weight:500}
  .reader-mode-banner kbd{font-family:var(--font-mono);font-size:10px;background:var(--bg-elev);border:1px solid var(--pine-300);border-bottom-width:2px;border-radius:4px;padding:1px 5px;color:var(--fg-2)}
  .reader-mode-banner code{font-family:var(--font-mono);font-size:11.5px;background:var(--bg-elev);padding:1px 5px;border-radius:4px;border:1px solid var(--pine-200)}

  .spec-doc{max-width:740px;margin:0 auto;padding:32px 40px}
  .spec-head .path{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px}
  .spec-head .path b{color:var(--fg-1)}
  .spec-doc h1{font-family:var(--font-display);font-weight:500;font-size:40px;letter-spacing:-0.015em;line-height:1.1;margin:0 0 8px;color:var(--pine-900)}
  .spec-doc h2{font-family:var(--font-display);font-weight:500;font-size:22px;margin:28px 0 10px;color:var(--pine-900);padding-bottom:6px;border-bottom:1px solid var(--pine-200)}

  .input-list{list-style:none;padding:0;margin:0 0 12px;display:flex;flex-direction:column;gap:4px}
  .input-list li{font-size:13.5px;color:var(--fg-2);display:flex;align-items:center;gap:8px}
  .input-list code{background:var(--bg-sunk);border:1px solid var(--pine-200);padding:1px 6px;border-radius:3px;font-size:12px;color:var(--pine-900)}

  .def{padding:16px 18px;border:1px solid transparent;border-radius:10px;margin:16px 0;transition:background var(--dur-2) var(--ease-standard),border-color var(--dur-2) var(--ease-standard)}
  .def:hover{background:var(--bg-elev);border-color:var(--pine-200)}
  .def.active{background:color-mix(in oklab, var(--brand-blue) 7%, var(--bg-elev));border-color:color-mix(in oklab, var(--brand-blue) 40%, var(--pine-200));box-shadow:0 0 0 3px color-mix(in oklab, var(--brand-blue) 14%, transparent)}
  .def.final{background:var(--bg-elev);border-color:var(--pine-200);box-shadow:var(--shadow-2)}
  .def-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:4px}
  .def h3{margin:0;font-family:var(--font-display);font-weight:500;font-size:18px;color:var(--pine-900)}
  .def h3 code{background:transparent;border:0;padding:0;font-family:var(--font-mono);font-size:16px;color:var(--pine-900)}
  .def-desc{font-size:13.5px;color:var(--fg-2);margin:0 0 10px;line-height:1.55}
  .op-tree{margin:0;background:var(--bg-sunk);border:1px solid var(--pine-200);border-radius:8px;padding:10px 14px;font-family:var(--font-mono);font-size:12.5px;line-height:1.7;color:var(--pine-900);white-space:pre}
  .op-tree .op{color:var(--brand-blue-ink);font-weight:500}
  .op-tree .id{color:var(--brand-orange-ink)}
  .op-tree .lit{color:var(--pine-600)}

  /* ── Value chips ────────────────────────────────────────────── */
  .val-chip{font-family:var(--font-mono);font-size:12px;padding:3px 9px;border-radius:999px;background:var(--pine-100);color:var(--pine-800);border:1px solid var(--pine-200);line-height:1.3}
  .val-chip.bound{background:var(--brand-blue-soft);color:var(--brand-blue-ink);border-color:color-mix(in oklab, var(--brand-blue) 25%, var(--pine-200))}
  .val-chip.active{background:var(--brand-blue);color:#fff;border-color:var(--brand-blue-ink);box-shadow:0 0 0 3px color-mix(in oklab, var(--brand-blue) 22%, transparent)}
  .val-chip.diff{display:inline-flex;align-items:center;gap:6px;background:var(--brand-orange-soft);border-color:color-mix(in oklab, var(--brand-orange) 30%, var(--pine-200));color:var(--brand-orange-ink)}
  .val-chip.diff .old{text-decoration:line-through;opacity:.7}
  .val-chip.diff .arr{color:var(--brand-orange);font-weight:600}
  .val-chip.diff .new{font-weight:600}

  /* ── Inspector ──────────────────────────────────────────────── */
  .insp-section{border-bottom:1px solid var(--pine-200);padding:12px 4px 16px}
  .insp-section:last-child{border-bottom:0}
  .insp-eyebrow{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--fg-3);margin-bottom:8px}
  .insp-kv{display:flex;flex-direction:column;gap:6px}
  .insp-kv label{display:grid;grid-template-columns:110px 1fr;align-items:center;gap:8px;font-family:var(--font-mono);font-size:11.5px;color:var(--fg-2)}
  .insp-kv input{padding:5px 8px;font-size:12px}
  .insp-step{display:grid;grid-template-columns:1fr auto 1fr;gap:6px;align-items:center;margin-bottom:8px}
  .insp-step .step-name{text-align:center;font-family:var(--font-mono);font-size:12px;color:var(--pine-900);background:var(--brand-blue-soft);padding:4px 10px;border-radius:6px}
  .insp-step .step-name em{color:var(--fg-3);font-style:normal}
  .insp-step .s-btn{padding:6px 9px;font-size:11.5px}
  .insp-actions{display:flex;gap:6px;flex-wrap:wrap}
  .insp-actions .s-btn{padding:6px 10px;font-size:11.5px}

  .insp-tests{display:flex;flex-direction:column;gap:4px}
  .t-row{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:6px;font-family:var(--font-mono);font-size:11px;padding:4px 6px;border-radius:5px}
  .t-row:hover{background:var(--pine-100)}
  .t-row code{font-size:11px;color:var(--pine-900);background:transparent;border:0;padding:0}
  .t-row .t-inputs{color:var(--fg-3);font-size:10.5px;grid-column:1 / -1;padding-left:24px}
  .t-row .t-val{color:var(--brand-orange-ink);font-weight:500}
  .t-row .s-chip{padding:1px 5px;font-size:10px}

  .provenance .prov-list{display:flex;flex-direction:column;gap:4px}
  .provenance a{font-family:var(--font-mono);font-size:11.5px}
  .prov-quote{font-style:italic;font-size:12px;color:var(--fg-2);padding:6px 10px;border-left:2px solid var(--brand-blue);background:var(--brand-blue-soft);border-radius:0 4px 4px 0}

  /* ── Statusbar ──────────────────────────────────────────────── */
  .statusbar{display:grid;grid-template-columns:auto 1fr auto;gap:20px;padding:7px 20px;border-top:1px solid var(--pine-200);background:var(--bg-elev);font-family:var(--font-mono);font-size:11px;color:var(--fg-3)}
  .statusbar > span:nth-child(2){text-align:center}

  @media (max-width:1100px){
    .work{grid-template-columns:220px 1fr}
    .right-rail{display:none}
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="./ModuleTree.jsx"></script>
  <script type="text/babel" src="./SpecDocument.jsx"></script>
  <script type="text/babel" src="./Inspector.jsx"></script>
  <script type="text/babel" src="./SpecEditor.jsx"></script>
  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<SpecEditor />);
  </script>
</body>
</html>
