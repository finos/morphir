<!doctype html>
<html><head><meta charset="utf-8"><title>Fields</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;height:100%;background:var(--paper);font-family:var(--font-body)}
  body{padding:20px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
  label{display:flex;flex-direction:column;gap:6px;font-size:12px;color:var(--fg-2)}
  label b{color:var(--fg-1);font-weight:600;font-size:12px;letter-spacing:0.02em}
</style></head>
<body class="substrate">
  <label><b>unit_price</b><input class="s-input" value="12.50"></label>
  <label><b>quantity</b><input class="s-input" placeholder="integer ≥ 1"></label>
  <label><b>reporter</b><select class="s-select"><option>text</option><option>junit</option></select></label>
  <label><b>definition</b><input class="s-input" value="total" style="border-color:var(--brand-blue);box-shadow:0 0 0 3px color-mix(in oklab, var(--brand-blue) 22%, transparent)"></label>
</body></html>
