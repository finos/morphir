<!doctype html>
<html><head><meta charset="utf-8"><title>Type · Display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;height:100%;font-family:var(--font-body);color:var(--fg-1);background:var(--paper)}
  body{padding:20px 26px;display:flex;flex-direction:column;gap:6px}
  .eyebrow{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--fg-3);font-family:var(--font-mono)}
  .d1{font-family:var(--font-display);font-weight:500;font-size:48px;letter-spacing:-0.015em;line-height:1.05;color:var(--pine-900)}
  .d2{font-family:var(--font-display);font-weight:500;font-size:28px;letter-spacing:-0.01em;line-height:1.2;color:var(--pine-800)}
  .lede{font-family:var(--font-display);font-weight:400;font-style:italic;font-size:17px;color:var(--fg-2);max-width:640px}
  .tag{font-family:var(--font-mono);font-size:10px;color:var(--fg-4)}
</style></head>
<body>
  <div class="eyebrow">Display · Fraunces</div>
  <div class="d1">Executable specifications.</div>
  <div class="d2">A typed dataflow graph, in markdown.</div>
  <div class="lede">Semantics over syntax — structure emerges from meaning, not from grammar.</div>
  <div class="tag">500 · -0.015em / 1.05 · balance</div>
</body></html>
