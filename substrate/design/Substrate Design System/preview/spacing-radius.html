<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing & radius</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;height:100%;font-family:var(--font-body);background:var(--paper);color:var(--fg-1)}
  body{padding:16px 22px;display:grid;grid-template-columns:1fr 1fr;gap:22px}
  .col{display:flex;flex-direction:column;gap:6px}
  .eyebrow{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--fg-3);font-family:var(--font-mono)}
  .bars{display:flex;align-items:flex-end;gap:10px}
  .bar{background:var(--pine-700);height:12px}
  .bar span{display:block;margin-top:6px;font-family:var(--font-mono);font-size:10px;color:var(--fg-3);text-align:center}
  .radii{display:flex;gap:10px;align-items:center}
  .rd{background:var(--pine-100);border:1px solid var(--pine-200);width:46px;height:46px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:4px;font-family:var(--font-mono);font-size:10px;color:var(--fg-3)}
</style></head>
<body>
  <div class="col">
    <div class="eyebrow">Spacing · 4px base, 40 / 80 lattice</div>
    <div class="bars">
      <div><div class="bar" style="width:4px"></div><span>4</span></div>
      <div><div class="bar" style="width:8px"></div><span>8</span></div>
      <div><div class="bar" style="width:12px"></div><span>12</span></div>
      <div><div class="bar" style="width:16px"></div><span>16</span></div>
      <div><div class="bar" style="width:24px"></div><span>24</span></div>
      <div><div class="bar" style="width:32px"></div><span>32</span></div>
      <div><div class="bar" style="width:40px;background:#16A2DC"></div><span>40·s</span></div>
      <div><div class="bar" style="width:64px"></div><span>64</span></div>
      <div><div class="bar" style="width:80px;background:#F26A21"></div><span>80·S</span></div>
    </div>
  </div>
  <div class="col">
    <div class="eyebrow">Radii</div>
    <div class="radii">
      <div class="rd" style="border-radius:3px">3</div>
      <div class="rd" style="border-radius:6px">6</div>
      <div class="rd" style="border-radius:10px">10</div>
      <div class="rd" style="border-radius:14px">14</div>
      <div class="rd" style="border-radius:20px">20</div>
      <div class="rd" style="border-radius:999px">pill</div>
    </div>
  </div>
</body></html>
