<!doctype html>
<html><head><meta charset="utf-8"><title>Logo · Variants</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;height:100%;background:var(--bg)}
  body{display:grid;grid-template-columns:1fr 1fr 1.4fr;font-family:var(--font-body);color:var(--fg-1)}
  .cell{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:20px;background:var(--bg-elev)}
  .cell + .cell{border-left:1px solid var(--pine-200)}
  .cell img{width:74px;height:74px}
  .cell.paper{background:var(--bg-radial)}
  .cell span{font-size:11px;color:var(--fg-3);font-family:var(--font-mono);letter-spacing:0.04em;text-transform:uppercase}
  .lockup{width:auto;height:64px}
</style></head>
<body>
  <div class="cell paper"><img src="../assets/logo.svg" alt=""><span>primary</span></div>
  <div class="cell"><img src="../assets/logo-mono-ink.svg" alt=""><span>mono · ink</span></div>
  <div class="cell"><img class="lockup" src="../assets/logo-lockup.svg" alt=""><span>lockup</span></div>
</body></html>
