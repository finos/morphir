<!doctype html>
<html><head><meta charset="utf-8"><title>Colors · Pine scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;height:100%;font-family:var(--font-body);color:var(--fg-1);background:var(--paper)}
  body{display:flex;flex-direction:column;padding:18px 22px;gap:10px}
  .label{display:flex;align-items:baseline;gap:10px}
  .label b{font-family:var(--font-display);font-weight:500;font-size:16px}
  .label span{font-size:12px;color:var(--fg-3)}
  .ramp{display:grid;grid-template-columns:repeat(11,1fr);gap:4px}
  .sw{aspect-ratio:1.1/1;border-radius:6px;display:flex;align-items:flex-end;padding:4px 5px;font-family:var(--font-mono);font-size:9px;border:1px solid rgba(36,50,40,0.06)}
  .sw.light{color:var(--fg-2)} .sw.dark{color:#EEF4EF}
</style></head>
<body>
  <div class="label"><b>Pine</b><span>surface + text · desaturated greens tuned to the lattice ink</span></div>
  <div class="ramp">
    <div class="sw light" style="background:#FDFEFD">pure</div>
    <div class="sw light" style="background:#F7F9F7">paper</div>
    <div class="sw light" style="background:#EEF4EF">50</div>
    <div class="sw light" style="background:#E6ECE7">100</div>
    <div class="sw light" style="background:#D5DFD8">200</div>
    <div class="sw light" style="background:#B6C6BC">300</div>
    <div class="sw light" style="background:#8BA191">400</div>
    <div class="sw dark"  style="background:#5A735F">500</div>
    <div class="sw dark"  style="background:#3F5A49">600</div>
    <div class="sw dark"  style="background:#2F4738">700</div>
    <div class="sw dark"  style="background:#243228">800</div>
  </div>
</body></html>
