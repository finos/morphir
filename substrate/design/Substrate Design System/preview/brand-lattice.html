<!doctype html>
<html><head><meta charset="utf-8"><title>Lattice Background</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;height:100%;overflow:hidden}
  body{background:var(--bg-radial);position:relative;font-family:var(--font-body)}
  .plate{position:absolute;inset:0}
  .caption{position:absolute;left:18px;bottom:14px;padding:7px 11px;border-radius:8px;background:rgba(255,255,255,0.78);backdrop-filter:blur(2px);font-size:12px;color:var(--pine-800);display:flex;gap:14px;align-items:center}
  .caption b{font-family:var(--font-display);font-weight:500;font-size:14px}
  .caption code{font-family:var(--font-mono);font-size:11px;color:var(--fg-3)}
</style></head>
<body>
  <div class="plate" id="plate"></div>
  <div class="caption">
    <b>Triangular lattice</b>
    <code>s = 26px</code>
    <code>dot pine-700 / .26</code>
    <code>line pine-700 / .11</code>
  </div>
  <script src="../assets/lattice-background.js"></script>
  <script>SubstrateLattice.install(document.getElementById('plate'));</script>
</body></html>
