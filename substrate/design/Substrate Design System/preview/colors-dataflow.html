<!doctype html>
<html><head><meta charset="utf-8"><title>Dataflow semantics</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;height:100%;font-family:var(--font-body)}
  body{background:var(--paper);display:flex;flex-direction:column;padding:18px 22px;gap:10px}
  h3{margin:0;font-family:var(--font-display);font-weight:500;font-size:16px}
  .row{display:flex;gap:18px;align-items:center}
  .node{display:flex;align-items:center;gap:8px;padding:6px 11px;border-radius:8px;font-family:var(--font-mono);font-size:12px;color:#fff}
  .node.src{background:#16A2DC}
  .node.out{background:#F26A21}
  .node.id{background:#2F4738}
  .node.rule{background:#8A5AA0}
  .legend{font-size:12px;color:var(--fg-3)}
  .legend b{color:var(--fg-1)}
</style></head>
<body>
  <h3>Dataflow role colours</h3>
  <div class="row">
    <span class="node src">● input</span>
    <span class="node out">● derived</span>
    <span class="node id">● identity</span>
    <span class="node rule">● rule</span>
  </div>
  <div class="legend">Used in graph overlays, inline chips, and margin marks beside definitions. <b>Blue = given</b>, <b>orange = computed</b>, pine = passthrough, purple = decision-table row.</div>
</body></html>
