<!doctype html>
<html><head><meta charset="utf-8"><title>Colors · Brand signals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;height:100%;font-family:var(--font-body);color:var(--fg-1)}
  body{display:grid;grid-template-columns:1fr 1fr;background:var(--paper)}
  .col{padding:20px 24px;display:flex;flex-direction:column;gap:10px}
  .col + .col{border-left:1px solid var(--pine-200)}
  .head{display:flex;align-items:center;gap:10px}
  .dot{width:18px;height:18px;border-radius:999px}
  .name{font-family:var(--font-display);font-weight:500;font-size:16px}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);margin-left:auto}
  .ramp{display:flex;gap:6px}
  .sw{flex:1;height:28px;border-radius:5px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:3px;font-family:var(--font-mono);font-size:9px}
  .use{font-size:12px;color:var(--fg-3);line-height:1.5}
</style></head>
<body>
  <div class="col">
    <div class="head"><span class="dot" style="background:#16A2DC"></span><span class="name">Blue</span><span class="hex">#16A2DC</span></div>
    <div class="ramp">
      <div class="sw" style="background:#D7EEF8;color:#0E7CA9">soft</div>
      <div class="sw" style="background:#16A2DC;color:#fff">500</div>
      <div class="sw" style="background:#0E7CA9;color:#fff">ink</div>
    </div>
    <div class="use">Links, input / source nodes, primary accent. First polyline in the mark.</div>
  </div>
  <div class="col">
    <div class="head"><span class="dot" style="background:#F26A21"></span><span class="name">Orange</span><span class="hex">#F26A21</span></div>
    <div class="ramp">
      <div class="sw" style="background:#FCE4D5;color:#C4531A">soft</div>
      <div class="sw" style="background:#F26A21;color:#fff">500</div>
      <div class="sw" style="background:#C4531A;color:#fff">ink</div>
    </div>
    <div class="use">Derived values, emphasis, impact-diff highlight. Second polyline.</div>
  </div>
</body></html>
