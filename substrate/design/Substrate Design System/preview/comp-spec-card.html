<!doctype html>
<html><head><meta charset="utf-8"><title>Spec card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;height:100%;background:var(--paper);font-family:var(--font-body)}
  body{padding:18px 22px;display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .card{background:#FDFEFD;border:1px solid var(--pine-200);border-radius:10px;padding:14px 16px;box-shadow:0 1px 2px rgba(36,50,40,.06)}
  .head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .head b{font-family:var(--font-display);font-weight:500;font-size:16px}
  .head a{color:var(--fg-3);font-size:12px}
  .desc{font-size:13px;color:var(--fg-2);line-height:1.5}
  pre{margin-top:10px;margin-bottom:0;padding:10px 12px;border-radius:8px;font-size:12px}
  .ok{color:#3B8E5A}
</style></head>
<body class="substrate">
  <div class="card">
    <div class="head"><b><code>subtotal</code></b><span class="s-chip ok">✓ 4/4</span></div>
    <div class="desc">Gross cost before discount or tax.</div>
    <pre>- <span style="color:#0E7CA9">Multiply</span>
  - <span style="color:#C4531A">unit_price</span>
  - <span style="color:#C4531A">quantity</span></pre>
  </div>
  <div class="card">
    <div class="head"><b><code>total</code></b><span class="s-chip blue">bound · 32.4</span></div>
    <div class="desc">Final amount due.</div>
    <pre>- <span style="color:#0E7CA9">Add</span>
  - <span style="color:#C4531A">discounted_subtotal</span>
  - <span style="color:#C4531A">tax_amount</span></pre>
  </div>
</body></html>
