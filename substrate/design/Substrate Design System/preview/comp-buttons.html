<!doctype html>
<html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;height:100%;background:var(--paper);font-family:var(--font-body)}
  body{padding:20px;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
</style></head>
<body class="substrate">
  <button class="s-btn">Run tests</button>
  <button class="s-btn secondary">Open module</button>
  <button class="s-btn ghost">Cancel</button>
  <button class="s-btn primary-blue">Bind data source</button>
  <button class="s-btn primary-orange">Replay</button>
  <button class="s-btn" disabled style="opacity:.5">Evaluate</button>
</body></html>
