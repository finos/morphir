<!doctype html>
<html><head><meta charset="utf-8"><title>Type · Mono & code</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;height:100%;font-family:var(--font-body);color:var(--fg-1);background:var(--paper)}
  body{padding:16px 22px;display:flex;flex-direction:column;gap:10px}
  .eyebrow{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--fg-3);font-family:var(--font-mono)}
  pre{margin:0}
  .tree{font-family:var(--font-mono);font-size:13px;line-height:1.65;color:var(--pine-900);background:var(--bg-sunk);border:1px solid var(--pine-200);border-radius:10px;padding:12px 16px}
  .tree .op{color:#0E7CA9}
  .tree .id{color:#C4531A}
  .specs{font-family:var(--font-mono);font-size:10px;color:var(--fg-4)}
</style></head>
<body>
  <div class="eyebrow">Mono · JetBrains Mono</div>
  <pre class="tree">- <span class="op">Add</span>
  - <span class="op">Multiply</span>
    - <span class="id">unit_price</span>
    - <span class="id">quantity</span>
  - <span class="id">tax</span></pre>
  <div class="specs">400/500 · 13px / 1.65 · liga off · tabular-nums</div>
</body></html>
