<!doctype html>
<html><head><meta charset="utf-8"><title>Colors · Semantic</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;height:100%;font-family:var(--font-body)}
  body{background:var(--paper);display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:18px}
  .tile{border:1px solid var(--pine-200);border-radius:10px;overflow:hidden;background:#fff;display:flex;flex-direction:column}
  .swatch{height:34px;display:flex;align-items:center;padding:0 12px;font-family:var(--font-mono);font-size:11px;color:#fff}
  .meta{padding:10px 12px;display:flex;flex-direction:column;gap:4px}
  .meta b{font-size:13px;color:var(--fg-1)}
  .meta span{font-size:11px;color:var(--fg-3)}
  .chip{align-self:flex-start;margin-top:4px}
</style></head>
<body>
  <div class="tile"><div class="swatch" style="background:#3B8E5A">#3B8E5A</div><div class="meta"><b>ok</b><span>test pass, validated</span><span class="s-chip ok">3/3 passed</span></div></div>
  <div class="tile"><div class="swatch" style="background:#C47A0E">#C47A0E</div><div class="meta"><b>warn</b><span>inference warning</span><span class="s-chip warn">inferred</span></div></div>
  <div class="tile"><div class="swatch" style="background:#C0392B">#C0392B</div><div class="meta"><b>fail</b><span>contradiction, test fail</span><span class="s-chip fail">1 failing</span></div></div>
  <div class="tile"><div class="swatch" style="background:#16A2DC">#16A2DC</div><div class="meta"><b>info</b><span>bound value, link</span><span class="s-chip blue">bound</span></div></div>
</body></html>
