<!doctype html>
<html><head><meta charset="utf-8"><title>Logo · Primary</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;height:100%}
  body{background:var(--bg-radial);display:flex;align-items:center;justify-content:space-between;padding:0 36px;font-family:var(--font-body);color:var(--fg-1)}
  .mark{display:flex;gap:28px;align-items:center}
  .mark svg{width:92px;height:92px}
  .meta{font-size:12px;color:var(--fg-3);line-height:1.5}
  .meta b{display:block;font-family:var(--font-display);font-weight:500;color:var(--fg-1);font-size:18px;letter-spacing:-0.01em;margin-bottom:4px}
  .swatches{display:flex;gap:10px}
  .sw{display:flex;align-items:center;gap:8px;font-family:var(--font-mono);font-size:11px;color:var(--fg-2)}
  .sw i{width:14px;height:14px;border-radius:4px;display:inline-block}
</style></head>
<body>
  <div class="mark">
    <img src="../assets/logo.svg" alt="">
    <div class="meta">
      <b>Substrate Mark</b>
      Two polylines tracing partial hexagons<br>in the A₂ triangular lattice.
    </div>
  </div>
  <div class="swatches">
    <div class="sw"><i style="background:#16A2DC"></i>#16A2DC</div>
    <div class="sw"><i style="background:#F26A21"></i>#F26A21</div>
  </div>
</body></html>
