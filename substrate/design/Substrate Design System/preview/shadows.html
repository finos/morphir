<!doctype html>
<html><head><meta charset="utf-8"><title>Shadows & borders</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;height:100%;font-family:var(--font-body);background:var(--paper);color:var(--fg-1)}
  body{padding:22px;display:grid;grid-template-columns:repeat(4,1fr);gap:16px;align-items:center}
  .card{background:#FDFEFD;border:1px solid var(--pine-200);border-radius:10px;padding:14px 16px;min-height:72px;display:flex;flex-direction:column;gap:4px;justify-content:center}
  .card b{font-family:var(--font-display);font-weight:500;font-size:14px}
  .card span{font-family:var(--font-mono);font-size:10px;color:var(--fg-3)}
  .s1{box-shadow:0 1px 2px rgba(36,50,40,.06),0 1px 1px rgba(36,50,40,.04)}
  .s2{box-shadow:0 2px 6px rgba(36,50,40,.07),0 1px 2px rgba(36,50,40,.05)}
  .s3{box-shadow:0 8px 24px rgba(36,50,40,.09),0 2px 6px rgba(36,50,40,.06)}
  .sink{box-shadow:inset 0 0 0 1px rgba(36,50,40,.08);background:var(--bg-sunk);border:1px dashed var(--pine-300)}
</style></head>
<body>
  <div class="card s1"><b>shadow-1</b><span>resting card</span></div>
  <div class="card s2"><b>shadow-2</b><span>hover</span></div>
  <div class="card s3"><b>shadow-3</b><span>floating / overlay</span></div>
  <div class="card sink"><b>shadow-ink</b><span>sunken · code well</span></div>
</body></html>
