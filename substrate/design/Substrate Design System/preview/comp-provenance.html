<!doctype html>
<html><head><meta charset="utf-8"><title>Provenance block</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;height:100%;background:var(--paper);font-family:var(--font-body)}
  body{padding:16px 22px}
  .ey{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--fg-3);font-family:var(--font-mono);margin-bottom:4px}
  h4{margin:0 0 6px;font-family:var(--font-display);font-weight:500;font-size:15px;color:var(--pine-900)}
  ul{margin:0;padding-left:18px;font-size:13px;line-height:1.55}
  blockquote{margin:6px 0 0 0;padding:8px 14px;border-left:3px solid var(--brand-blue);background:#D7EEF8;color:var(--pine-800);border-radius:0 6px 6px 0;font-style:italic;font-size:12.5px}
  a{color:var(--brand-blue)}
</style></head>
<body class="substrate">
  <div class="ey">Provenance · external source of authority</div>
  <h4>Retail Outflow Rate</h4>
  <ul>
    <li><a href="#">12 CFR §249.32(a)(1)</a>
      <blockquote>A covered company shall apply a 3 percent outflow rate to the amount of FDIC-insured stable retail deposits held by a natural person…</blockquote>
    </li>
  </ul>
</body></html>
