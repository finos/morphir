<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Morphir Substrate — Logo Construction Grid</title>
    <style>
        html,
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f7f9f7;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        .caption {
            position: fixed;
            left: 1rem;
            bottom: 1rem;
            padding: 0.45rem 0.7rem;
            border-radius: 0.45rem;
            background: rgba(255, 255, 255, 0.8);
            color: #243228;
            font-size: 0.8rem;
            letter-spacing: 0.02em;
        }
    </style>
</head>

<body>
    <!--
    4×4 triangular lattice construction grid.
    "4×4" means 4 triangle-intervals in each direction → 5×5 = 25 nodes.
    Odd columns are shifted down by half a spacing so that the embedded
    hexagons are pointy-top without any rotation.
    Node numbers run left-to-right, top-to-bottom.
  -->
    <svg id="grid" width="600" height="600" viewBox="-300 -300 600 600"
        aria-label="4 by 4 triangular lattice construction grid with 25 numbered nodes"></svg>

    <div class="caption">4×4 triangular lattice — 25 nodes</div>

    <script>
        // ── Lattice parameters ────────────────────────────────────────────────────
        const SPACING = 80;                             // side length of each equilateral triangle (px)
        const COL_WIDTH = SPACING * Math.sqrt(3) / 2;  // ≈ 69.28 px  (= SPACING × √3/2)
        const ROWS = 5;                                 // 5 node-rows  → 4 row-intervals
        const COLS = 5;                                 // 5 node-cols  → 4 col-intervals
        const DOT_RADIUS = 16;                          // px

        const NS = 'http://www.w3.org/2000/svg';
        const svg = document.getElementById('grid');

        // Centre the grid on the SVG origin (0, 0).
        const gridW = (COLS - 1) * COL_WIDTH;                  // ≈ 277.13
        const gridH = (ROWS - 1) * SPACING + SPACING / 2;     // 360
        const shiftX = gridW / 2;   // ≈ 138.56
        const shiftY = gridH / 2;   // 180

        // ── Pass 1: compute all node positions into a lookup map ─────────────────
        // Odd columns are shifted down by SPACING/2.
        const nodePos = new Map(); // nodeId → { cx, cy }
        let nodeId = 1;
        for (let row = 0; row < ROWS; row++) {
            for (let col = 0; col < COLS; col++) {
                const yShift = (col % 2 !== 0) ? SPACING / 2 : 0;
                nodePos.set(nodeId, {
                    cx: col * COL_WIDTH - shiftX,
                    cy: row * SPACING + yShift - shiftY
                });
                nodeId++;
            }
        }

        // ── Pass 2: draw polylines ───────────────────────────────────────────────
        const polylines = [
            { nodes: [4, 3, 2, 7, 13], color: '#16A2DC' },
            { nodes: [8, 9, 14, 18, 12], color: '#F26A21' },
        ];

        for (const { nodes, color } of polylines) {
            const points = nodes
                .map(id => {
                    const p = nodePos.get(id);
                    return `${p.cx.toFixed(3)},${p.cy.toFixed(3)}`;
                })
                .join(' ');

            const pl = document.createElementNS(NS, 'polyline');
            pl.setAttribute('points', points);
            pl.setAttribute('fill', 'none');
            pl.setAttribute('stroke', color);
            pl.setAttribute('stroke-width', (DOT_RADIUS * 2 * 1.2).toFixed(1));
            pl.setAttribute('stroke-linecap', 'round');
            pl.setAttribute('stroke-linejoin', 'round');
            svg.appendChild(pl);
        }
    </script>
</body>

</html>
