name: CI

on:
  push:
    branches:
      - main
      - setup/**
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  # Detect what files changed to enable fast-path for docs-only changes
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      docs: ${{ steps.filter.outputs.docs }}
      morphir-scala: ${{ steps.filter.outputs.morphir-scala }}
      morphir-moonbit: ${{ steps.filter.outputs.morphir-moonbit }}
      schema: ${{ steps.filter.outputs.schema }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check for file changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'crates/**'
              - '.github/workflows/ci.yml'
            docs:
              - 'website/**'
              - 'docs/**'
              - '**/*.md'
              - '.github/workflows/ci.yml'
            morphir-scala:
              - 'morphir/**'
              - 'build-helpers.mill'
              - '.github/workflows/ci.yml'
            morphir-moonbit:
              - 'ecosystem/morphir-moonbit/**'
              - '.github/workflows/ci.yml'
            schema:
              - 'website/static/schemas/**'
              - '.github/workflows/ci.yml'

  # morphir-live: web UI application (depends on dioxus)
  morphir-live:
    name: morphir-live
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install mise
        uses: jdx/mise-action@v3

      - name: Initialize environment
        run: mise run init -- --ci

      - name: Add Rust components
        run: rustup component add rustfmt clippy

      - name: Install GTK dependencies (for desktop build)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev libxdo-dev

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          key: morphir-live

      - name: Check formatting
        run: cargo fmt --package morphir-live --check

      - name: Run clippy
        run: cargo clippy --package morphir-live --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --package morphir-live

      - name: Build (web)
        run: cargo build --release --package morphir-live

      - name: Build (desktop)
        run: cargo build --release --package morphir-live --features desktop

  # morphir: CLI tool (depends on extism via morphir-daemon)
  # Uses separate dependency resolution to avoid conflict with dioxus-desktop
  morphir-cli:
    name: morphir CLI
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install mise
        uses: jdx/mise-action@v3

      - name: Initialize environment
        run: mise run init -- --ci

      - name: Add Rust components
        run: rustup component add rustfmt clippy

      # Generate fresh lockfile without dioxus-desktop to avoid toml_datetime conflict
      - name: Prepare CLI workspace
        run: mise run ci:prepare-cli-workspace

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          key: morphir-cli

      - name: Check formatting
        run: cargo fmt --package morphir --check

      - name: Run clippy
        run: cargo clippy --package morphir --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --package morphir

      - name: Build
        run: cargo build --release --package morphir

  # morphir-scala: Scala IR (morphir/core, morphir/classic) - v4 schema work
  morphir-scala:
    name: morphir-scala
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.morphir-scala == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install mise
        uses: jdx/mise-action@v3

      - name: Initialize environment
        run: mise run init -- --ci

      - name: Install Mill
        run: curl -sL https://github.com/com-lihaoyi/mill/releases/download/0.12.10/0.12.10 -o mill && chmod +x mill

      - name: Build and test
        run: ./mill morphir.core.test morphir.compile

  # morphir-moonbit: MoonBit submodule (v4 schema bindings)
  morphir-moonbit:
    name: morphir-moonbit
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.morphir-moonbit == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install mise
        uses: jdx/mise-action@v3

      - name: Initialize submodules
        run: git submodule update --init ecosystem/morphir-moonbit

      - name: Install tools in morphir-moonbit
        working-directory: ecosystem/morphir-moonbit
        run: |
          mise install
          chmod +x "$HOME/.local/share/mise/installs/http-moonbit"/*/bin/moon* 2>/dev/null || true
          chmod +x "$HOME/.local/share/mise/installs/http-moonbit"/*/bin/internal/moonrun 2>/dev/null || true

      - name: Lint and format check
        working-directory: ecosystem/morphir-moonbit
        run: |
          mise run lint
          mise run lint:moonbit

  # schema: JSON Schema validation and formatting
  schema:
    name: Schema
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.schema == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install mise
        uses: jdx/mise-action@v3

      - name: Initialize environment
        run: mise run init -- --ci

      - name: Lint and format check schemas
        run: |
          mise run fmt-check:schema
          mise run lint:schema

  # Docs: lightweight job for documentation changes (fast-path)
  # Note: This job intentionally does NOT install mise to stay fast
  docs:
    name: Docs
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.docs == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate documentation
        run: python3 .config/mise/tasks/ci/validate_docs.py

  check:
    name: All Checks
    runs-on: ubuntu-latest
    needs: [changes, morphir-live, morphir-cli, morphir-scala, morphir-moonbit, schema, docs]
    if: always()
    steps:
      - name: Check results
        run: |
          # Check if rust jobs were required and passed
          if [[ "${{ needs.changes.outputs.rust }}" == "true" ]]; then
            if [[ "${{ needs.morphir-live.result }}" != "success" ]]; then
              echo "morphir-live failed"
              exit 1
            fi
            if [[ "${{ needs.morphir-cli.result }}" != "success" ]]; then
              echo "morphir-cli failed"
              exit 1
            fi
          fi
          # Check if docs job was required and passed
          if [[ "${{ needs.changes.outputs.docs }}" == "true" ]]; then
            if [[ "${{ needs.docs.result }}" != "success" ]]; then
              echo "docs failed"
              exit 1
            fi
          fi
          # Check if morphir-scala (v4 schema work) was required and passed
          if [[ "${{ needs.changes.outputs.morphir-scala }}" == "true" ]]; then
            if [[ "${{ needs.morphir-scala.result }}" != "success" ]]; then
              echo "morphir-scala failed"
              exit 1
            fi
          fi
          # Check if morphir-moonbit was required and passed
          if [[ "${{ needs.changes.outputs.morphir-moonbit }}" == "true" ]]; then
            if [[ "${{ needs.morphir-moonbit.result }}" != "success" ]]; then
              echo "morphir-moonbit failed"
              exit 1
            fi
          fi
          # Check if schema job was required and passed
          if [[ "${{ needs.changes.outputs.schema }}" == "true" ]]; then
            if [[ "${{ needs.schema.result }}" != "success" ]]; then
              echo "schema failed"
              exit 1
            fi
          fi
          echo "All required checks passed!"

  # TODO: Add WASM build once dioxus-cli workspace issue is resolved
